name: Deploy Documentation

on:
  push:
    branches: [master]
    paths:
      - 'docfx/**'
      - 'EtlKit/**'
      - 'EtlKit.Common/**'
      - 'EtlKit.Primitives/**'
      - 'EtlKit.Json/**'
      - 'EtlKit.Kafka/**'
      - 'EtlKit.Rest/**'
      - 'EtlKit.RabbitMq/**'
      - 'EtlKit.Serialization/**'
      - 'EtlKit.AI/**'
      - 'EtlKit.ClickHouse/**'
      - 'EtlKit.Logging.Database/**'
      - 'EtlKit.Scripting/**'
      - 'EtlKit.DynamicLinq/**'
      - 'EtlKit.MongoDB/**'
      - 'EtlKit.PostgresStreaming/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install DocFx
        run: dotnet tool restore

      - name: Build solution
        run: dotnet build EtlKit.sln -c Release
        env:
          HUSKY: 0

      - name: Generate docs
        run: dotnet docfx docfx/docfx.json

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
