# GitVersion configuration for projects following the GitFlow development process.
#
# Version increment strategies by branch type:
#   hotfix/*        — bug fix in master/support                  → Patch  (built-in default)
#   bugfix/*        — bug fix in develop/release                 → Patch  (explicitly set below)
#   feature/*       — new feature from develop                   → Minor  (built-in default)
#   dev/*           — sub-tasks of a feature, branched from feature → Inherit from feature (explicitly set below)
#   release/*       — release branch from develop                → Minor  (built-in default)
#   support/*       — old version support from master            → Patch  (built-in default)
#   documentation/* — documentation from develop/feature         → Inherit (explicitly set below)

next-version: 2.0.0

branches:
  # bugfix/* branches are created for bug fixes in develop or release.
  # Without explicit configuration GitVersion treats them as type unknown and
  # computes the increment from develop (Minor), yielding an unexpected result —
  # e.g. 1.17.0 instead of the expected 1.16.1. Explicit Patch fixes this.
  bugfix:
    mode: ManualDeployment
    label: '{BranchName}'
    increment: Patch
    prevent-increment:
      when-current-commit-tagged: false
    regex: ^bugfix(es)?[/-](?<BranchName>.+)
    source-branches:
    - main
    - develop
    - release
    - support
    is-source-branch-for: []
    is-main-branch: false
    pre-release-weight: 30000

  # dev/* branches are used for sub-tasks within a feature.
  # Without explicit configuration they fall into unknown and may resolve
  # the source incorrectly. Explicit configuration limits source-branches
  # to feature and develop.
  dev:
    mode: ManualDeployment
    label: '{BranchName}'
    increment: Inherit
    prevent-increment:
      when-current-commit-tagged: false
    regex: ^dev[/-](?<BranchName>.+)
    source-branches:
    - feature
    - develop
    is-source-branch-for: []
    is-main-branch: false
    pre-release-weight: 30000

  # documentation/* branches are used for documentation changes.
  # Version is inherited from the parent branch (develop or feature).
  documentation:
    mode: ManualDeployment
    label: '{BranchName}'
    increment: Inherit
    prevent-increment:
      when-current-commit-tagged: false
    regex: ^documentation[/-](?<BranchName>.+)
    source-branches:
    - develop
    - feature
    is-source-branch-for: []
    is-main-branch: false
    pre-release-weight: 30000
