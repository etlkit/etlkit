# GitVersion configuration for ETLBox
# Branching strategy: GitFlow (see Confluence: "Процесс разработки в Git")
#
# Branch types and their version increment:
#   hotfix/*       — bug fix on master/support    → Patch  (configured below)
#   bugfix/*       — bug fix on develop/release   → Patch  (configured below)
#   feature/*      — new feature from develop     → Minor  (built-in default)
#   dev/*          — subtask branch from feature  → Inherit from feature (configured below)
#   release/*      — release branch from develop  → Minor  (built-in default)
#   support/*      — old-version support branch   → Patch  (built-in default)
#   documentation/* — docs branch from develop/feature → Inherit (configured below)

branches:
  hotfix:
    # increment Patch + label {BranchName}: a hotfix is a fix for the already-released
    # master/support line, so it always bumps the patch (e.g. 1.20.0 -> 1.20.1).
    #
    # Do NOT use 'Inherit' here. Our master tip is a "Merge develop into master" commit and
    # the release tag sits on the develop side of that merge, so master and develop share the
    # same history. GitVersion's Inherit then cannot tell them apart and resolves to develop's
    # Minor, producing 1.21.0 instead of 1.20.1 (reproduced with GitVersion 6.7).
    mode: ContinuousDelivery
    label: '{BranchName}'
    increment: Patch
    prevent-increment:
      when-current-commit-tagged: false
    regex: ^hotfix(es)?[/-](?<BranchName>.+)
    source-branches:
      - main
      - support
      - develop
      - feature
    is-source-branch-for: []
    is-main-branch: false
    pre-release-weight: 30000

  bugfix:
    mode: ManualDeployment
    label: '{BranchName}'
    increment: Patch
    prevent-increment:
      when-current-commit-tagged: false
    regex: ^bugfix(es)?[/-](?<BranchName>.+)
    source-branches:
      - main
      - develop
      - release
      - support
    is-source-branch-for: []
    is-main-branch: false
    pre-release-weight: 30000

  dev:
    mode: ContinuousDelivery
    label: '{BranchName}'
    increment: Inherit
    prevent-increment:
      when-current-commit-tagged: false
    regex: ^dev[/-](?<BranchName>.+)
    source-branches:
      - feature
      - develop
    is-source-branch-for: []
    is-main-branch: false
    pre-release-weight: 30000

  documentation:
    mode: ManualDeployment
    label: '{BranchName}'
    increment: Inherit
    prevent-increment:
      when-current-commit-tagged: false
    regex: ^documentation[/-](?<BranchName>.+)
    source-branches:
      - develop
      - feature
    is-source-branch-for: []
    is-main-branch: false
    pre-release-weight: 30000
